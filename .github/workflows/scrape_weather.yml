name: Scrape IARI Daily Weather

on:
  # ── Daily at 08:15 IST (02:45 UTC) ────────────────────────────────────────
  # IARI publishes observations from the previous day by ~08:00 IST.
  # Running 15 min later gives the page time to update.
  schedule:
    - cron: "30 4 * * *"

  # ── Manual trigger with options ───────────────────────────────────────────
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — parse without writing files"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      verbose:
        description: "Enable verbose (DEBUG) logging"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  scrape:
    name: Scrape & commit
    runs-on: ubuntu-latest
    permissions:
      contents: write      # needed to push data files back to the repo

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1   # shallow clone — we only need HEAD

      # 2. Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      # 4. Run scraper
      - name: Run scraper
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ "${{ github.event.inputs.verbose }}" = "true" ]; then ARGS="$ARGS --verbose"; fi
          python scraper/scrape_iari.py $ARGS

      # 5. Commit & push updated data files (skipped on dry run)
      - name: Commit updated data files
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage only the data directory — never touch dashboard source files
          git add data/iari_weather.csv data/forecast.json data/monthly_rainfall.csv

          # Only commit if there is something to commit
          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit."
          else
            STAMP=$(date -u +"%Y-%m-%d %H:%MZ")
            git commit -m "data: auto-update weather data [${STAMP}]"
            git push
          fi

      # 6. Open an issue on repeated failures (optional but recommended)
      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Scraper failed — ${new Date().toISOString().slice(0,10)}`;
            const body  = `The daily IARI weather scrape failed.\n\n` +
                          `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n` +
                          `Check the run log for details. The IARI site may be temporarily unavailable.`;

            // Only open an issue if one with the same title is not already open
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              labels: 'scraper-failure',
            });

            const already_open = issues.some(i => i.title === title);
            if (!already_open) {
              await github.rest.issues.create({
                owner:  context.repo.owner,
                repo:   context.repo.repo,
                title,
                body,
                labels: ['scraper-failure'],
              });
            }
